name: Publish
on:
  push:
    tags:
      - 'v*'
jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    # Require manual approval via the 'npm' environment. Configure the
    # environment in GitHub Settings → Environments with required reviewers
    # and register NPM_TOKEN as an environment secret.
    environment:
      name: npm
      url: https://www.npmjs.com/package/@sauerapple/dye
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Verify tag is on main
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Tag commit $GITHUB_SHA is not an ancestor of origin/main"
            exit 1
          fi

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: npm install

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npx ava --serial
        env:
          FORCE_COLOR: 'true'
          CI: false

      - name: Publish
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
