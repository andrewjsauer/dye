name: Publish
on:
  push:
    tags:
      - 'v*'
jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm install
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Test
        run: npx ava --serial
        env:
          FORCE_COLOR: 'true'
          CI: false
      - name: Publish
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
